name: generate snake 3d contribution graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CONTRIB_TOKEN }}
      - uses: astral-sh/setup-uv@v3
      - name: self-check
        run: uv run --directory snake3d test_render.py
      - name: render
        env:
          GITHUB_TOKEN: ${{ secrets.CONTRIB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: uv run --directory snake3d render.py
      - name: commit & push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add snake3d/output.gif
          if git commit -m "generated"; then git push; fi
